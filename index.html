
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KY活動表</title>
</head>
<body>

<style>
  :root{
    --bg:#EDE7D8;
    --surface:#FFFFFF;
    --surface-alt:#F7F3E8;
    --border:#CBC0A1;
    --ink:#211F1A;
    --ink-soft:#6B6452;
    --navy:#142233;
    --navy-soft:#1E3450;
    --orange:#E2611B;
    --orange-soft:#F4A876;
    --red:#AD2B1F;
    --green:#2C6B3F;
    --radius:10px;
    --font-body:"Hiragino Sans","Noto Sans JP","Yu Gothic","Meiryo",sans-serif;
    --font-mono:"SF Mono","Consolas","Menlo",monospace;
  }
  *{box-sizing:border-box;}
  #ky-app{
    font-family:var(--font-body);
    color:var(--ink);
    background:var(--bg);
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px);
    background-size: 100% 28px;
    background-position: 0 64px;
    min-height:100%;
    padding-bottom:60px;
  }
  #ky-app .container{max-width:760px;margin:0 auto;padding:0 14px;}
  #ky-app button{font-family:inherit;cursor:pointer;}
  #ky-app input, #ky-app select, #ky-app textarea{font-family:inherit;color:var(--ink);}

  /* ---------- topbar ---------- */
  #ky-app .topbar{
    background:var(--navy);
    color:#fff;
    padding:14px 0;
    position:sticky;top:0;z-index:20;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  #ky-app .topbar-inner{display:flex;align-items:center;gap:12px;}
  #ky-app .stamp-mark{
    flex:none;width:42px;height:42px;border-radius:8px;
    background:var(--orange);color:#fff;font-weight:800;font-size:15px;
    display:flex;align-items:center;justify-content:center;
    transform:rotate(-5deg);letter-spacing:0;
    box-shadow:0 2px 0 rgba(0,0,0,.3);
  }
  #ky-app .brand-text{flex:1;min-width:0;}
  #ky-app .brand-text h1{font-size:14px;margin:0;font-weight:700;letter-spacing:.06em;opacity:.85;}
  #ky-app .project-input{
    width:100%;margin-top:2px;background:transparent;border:none;border-bottom:1px dashed rgba(255,255,255,.4);
    color:#fff;font-size:17px;font-weight:700;padding:2px 0;outline:none;
  }
  #ky-app .project-input::placeholder{color:rgba(255,255,255,.55);}
  #ky-app .topbar .btn{flex:none;}
  #ky-app .back-btn{
    flex:none;background:none;border:none;color:#fff;font-size:22px;padding:4px 8px;line-height:1;border-radius:6px;
  }
  #ky-app .back-btn:active{background:rgba(255,255,255,.15);}

  /* ---------- buttons ---------- */
  #ky-app .btn{
    border:none;border-radius:999px;padding:10px 18px;font-weight:700;font-size:14px;
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  }
  #ky-app .btn-primary{background:var(--orange);color:#fff;box-shadow:0 2px 0 rgba(0,0,0,.2);}
  #ky-app .btn-primary:active{transform:translateY(1px);box-shadow:none;}
  #ky-app .btn-primary:disabled{opacity:.6;}
  #ky-app .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--ink);}
  #ky-app .btn-danger{background:var(--red);color:#fff;}
  #ky-app .btn-sm{padding:7px 13px;font-size:13px;}
  #ky-app .btn-block{width:100%;justify-content:center;}

  /* ---------- toolbar / search ---------- */
  #ky-app .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 10px;align-items:center;}
  #ky-app .search-input{
    flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border);border-radius:999px;
    padding:10px 16px;font-size:14px;
  }
  #ky-app .date-input{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:10px 14px;font-size:13px;color:var(--ink-soft);}
  #ky-app .toolbar .clear-btn{background:none;border:none;color:var(--ink-soft);font-size:13px;text-decoration:underline;}

  /* ---------- list / cards ---------- */
  #ky-app .card-list{display:flex;flex-direction:column;gap:12px;margin-top:6px;}
  #ky-app .record-card{
    position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 16px;padding-right:78px;box-shadow:0 1px 0 rgba(0,0,0,.04);border-left:4px solid var(--orange);
  }
  #ky-app .record-card:active{background:var(--surface-alt);}
  #ky-app .record-date{font-family:var(--font-mono);font-weight:700;font-size:13px;color:var(--navy-soft);letter-spacing:.02em;}
  #ky-app .record-meta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  #ky-app .record-work{font-size:14px;margin-top:8px;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  #ky-app .record-work.empty{color:var(--ink-soft);font-style:italic;}
  #ky-app .record-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:var(--ink-soft);}
  #ky-app .stamp{
    position:absolute;top:14px;right:14px;width:54px;height:54px;border-radius:50%;
    border:2px solid var(--ink-soft);display:flex;align-items:center;justify-content:center;
    transform:rotate(-9deg);font-weight:800;font-size:12px;text-align:center;opacity:.85;letter-spacing:.02em;
  }
  #ky-app .stamp.ok{border-color:var(--green);color:var(--green);}
  #ky-app .stamp.ng{border-color:var(--red);color:var(--red);}
  #ky-app .stamp.pending{border-color:var(--ink-soft);color:var(--ink-soft);font-size:10px;}

  #ky-app .empty-state{text-align:center;padding:54px 20px;color:var(--ink-soft);}
  #ky-app .empty-state .big{font-size:34px;margin-bottom:8px;}

  /* ---------- form layout ---------- */
  #ky-app .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-top:16px;overflow:hidden;}
  #ky-app .section-head{
    background:var(--navy-soft);color:#fff;padding:9px 14px;font-weight:700;font-size:13px;letter-spacing:.08em;
  }
  #ky-app .section-body{padding:14px;}
  #ky-app .field{margin-bottom:12px;}
  #ky-app .field:last-child{margin-bottom:0;}
  #ky-app .field label{display:block;font-size:12px;color:var(--ink-soft);font-weight:700;margin-bottom:4px;}
  #ky-app .field input[type=text], #ky-app .field input[type=date], #ky-app .field input[type=number], #ky-app .field textarea{
    width:100%;border:1px solid var(--border);border-radius:6px;padding:9px 10px;font-size:14px;background:var(--surface-alt);
  }
  #ky-app .field textarea{resize:vertical;min-height:64px;}
  #ky-app .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  #ky-app .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  @media(max-width:520px){#ky-app .row3{grid-template-columns:1fr;}}

  #ky-app .worker-count-hint{font-size:12px;color:var(--ink-soft);margin-top:-4px;margin-bottom:10px;}

  /* hazard rows */
  #ky-app .hazard-row{display:grid;grid-template-columns:22px 1fr 1fr 28px;gap:8px;align-items:start;margin-bottom:8px;}
  #ky-app .hazard-row textarea{min-height:54px;}
  @media(max-width:560px){#ky-app .hazard-row{grid-template-columns:18px 1fr 28px;}#ky-app .hazard-row .measure-input{grid-column:2;}}
  #ky-app .row-num{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);padding-top:10px;text-align:center;}
  #ky-app .row-remove{background:none;border:none;color:var(--red);font-size:16px;padding-top:6px;}
  #ky-app .hazard-cols-label{display:grid;grid-template-columns:22px 1fr 1fr 28px;gap:8px;font-size:11px;color:var(--ink-soft);margin-bottom:4px;}
  @media(max-width:560px){#ky-app .hazard-cols-label{display:none;}}

  /* worker rows */
  #ky-app .worker-row{display:grid;grid-template-columns:22px 1fr 70px 28px;gap:8px;align-items:center;margin-bottom:8px;}
  #ky-app .worker-row select{border:1px solid var(--border);border-radius:6px;padding:9px 4px;background:var(--surface-alt);font-size:13px;}

  /* checklist groups */
  #ky-app .chk-groups{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:620px){#ky-app .chk-groups{grid-template-columns:1fr;}}
  #ky-app .chk-group-title{font-size:12px;font-weight:700;color:var(--navy-soft);border-bottom:2px solid var(--border);padding-bottom:4px;margin-bottom:8px;}
  #ky-app .chk-list{display:flex;flex-wrap:wrap;gap:7px;}
  #ky-app .chk{
    display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:999px;
    padding:8px 12px;background:var(--surface-alt);font-size:13px;user-select:none;
  }
  #ky-app .chk:has(input:checked){background:var(--orange);border-color:var(--orange);color:#fff;font-weight:700;}
  #ky-app .chk input{accent-color:var(--orange);width:16px;height:16px;}
  #ky-app .detail-input{
    margin-top:6px;width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:13px;background:var(--surface-alt);
  }
  #ky-app .detail-input.hidden{display:none;}
  #ky-app .chk-item-wrap{display:flex;flex-direction:column;}

  /* result toggle */
  #ky-app .result-toggle{display:flex;gap:10px;margin-top:6px;}
  #ky-app .result-btn{flex:1;border:2px solid var(--border);border-radius:8px;padding:12px;font-weight:700;background:var(--surface-alt);font-size:14px;}
  #ky-app .result-btn.active.result-ok{border-color:var(--green);background:#E5F1E7;color:var(--green);}
  #ky-app .result-btn.active.result-ng{border-color:var(--red);background:#F7E7E5;color:var(--red);}

  /* sticky save bar */
  #ky-app .save-bar{
    position:sticky;bottom:0;background:var(--bg);padding:14px 0 18px;display:flex;gap:10px;
    border-top:1px solid var(--border);margin-top:18px;
  }

  #ky-app .add-row-btn{margin-top:4px;background:none;border:1px dashed var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--navy-soft);font-weight:700;}

  /* toast & modal */
  #ky-app .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:999px;font-size:13px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.3);
    opacity:0;transition:opacity .25s;
  }
  #ky-app .toast.show{opacity:1;}
  #ky-app .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
  #ky-app .modal-box{background:#fff;border-radius:var(--radius);padding:20px;max-width:340px;width:100%;}
  #ky-app .modal-box p{font-size:14px;margin:0 0 16px;line-height:1.5;}
  #ky-app .modal-actions{display:flex;gap:10px;justify-content:flex-end;}

  #ky-app .loading-state{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  #ky-app .form-title{font-size:18px;font-weight:700;margin:14px 0 0;}
  #ky-app .form-subtitle{font-size:12px;color:var(--ink-soft);margin:2px 0 0;}
@media(max-width:768px){

  #ky-app .row2,
  #ky-app .row3{
    grid-template-columns:1fr;
  }

  #ky-app input,
  #ky-app textarea,
  #ky-app select{
    font-size:16px;
  }

  #ky-app .btn{
    min-height:48px;
    font-size:16px;
  }

  #ky-app .chk{
    padding:12px 16px;
    font-size:15px;
  }

  #ky-app .record-work{
    font-size:16px;
  }
}
  @media print{
    #ky-app .topbar, #ky-app .save-bar, #ky-app .toolbar, #ky-app .row-remove, #ky-app .add-row-btn, #ky-app .btn{display:none !important;}
    #ky-app{background:#fff;}
    #ky-app .section{border:1px solid #999;break-inside:avoid;}
    #ky-app input, #ky-app textarea, #ky-app select{background:transparent !important;border:none !important;}
  }
</style>

<div id="ky-app">
  <div class="topbar">
    <div class="container topbar-inner" id="topbarInner"></div>
  </div>
  <div class="container" id="mainArea"></div>
</div>

<script>
(function(){
  const root = document.getElementById('ky-app');
  const topbarInner = document.getElementById('topbarInner');
  const mainArea = document.getElementById('mainArea');

  const QUAL_CODES = ['','主','揮','監','誘','合'];

  const CHECK_GROUPS = [
    { title:'有資格者', key:'qualified', items:[
        {id:'tamakake', label:'玉掛'},
        {id:'gas', label:'ガス溶接'},
        {id:'arc', label:'アーク溶接'},
        {id:'crane', label:'クレーン', detail:{id:'craneDetail', placeholder:'トン数 例: 4.9t'}},
        {id:'lift', label:'リフト'},
        {id:'jiyama', label:'地山掘削作業主任者'},
        {id:'doshi', label:'土止支保工作業主任者'},
        {id:'vehicle', label:'車両建設機械', detail:{id:'vehicleDetail', placeholder:'機種・名称'}},
        {id:'ashiba', label:'足場作業主任者'},
        {id:'katawaku', label:'型枠支保工作業主任者'},
        {id:'tekkotsu', label:'鉄骨組立作業主任者'},
    ]},
    { title:'選任者', key:'appointed', items:[
        {id:'aizu', label:'合図者', detail:{id:'aizuName', placeholder:'氏名'}},
        {id:'shiki', label:'作業指揮者', detail:{id:'shikiName', placeholder:'氏名'}},
    ]},
    { title:'保護具', key:'ppe', items:[
        {id:'hat',label:'保安帽'},{id:'belt',label:'安全帯'},{id:'glasses',label:'保護メガネ'},{id:'mask',label:'防塵マスク'},
    ]},
    { title:'玉掛用具', key:'sling', items:[
        {id:'wire',label:'ワイヤーロープ'},{id:'fiber',label:'繊維ロープ'},{id:'hook',label:'フック'},{id:'shackle',label:'シャックル'},
    ]},
    { title:'機械器具', key:'machine', items:[
        {id:'sawguard',label:'丸鋸の接触防止'},{id:'beltcover',label:'ベルト・ギヤー類のカバー'},{id:'weldcover',label:'溶接ホルダーの絶縁カバー'},
    ]},
    { title:'電気', key:'electric', items:[
        {id:'cabledamage',label:'移動電線の損傷'},{id:'leakbreaker',label:'漏電防止遮断装置の作動'},{id:'earthwire',label:'アース線の接続'},
    ]},
    { title:'クレーン・リフト', key:'craneLift', items:[
        {id:'overwind',label:'過巻防止装置'},{id:'brakeclutch',label:'ブレーキ・クラッチ'},{id:'wirepass',label:'ワイヤーロープの通過部分'},
    ]},
  ];

  let state = {
    view:'loading',
    records:[],
    shared:{ projectName:'', companyName:'' },
    personal:{ displayName:'' },
    currentId:null,
  };

  /* ---------------- storage helpers ---------------- */
  async function sGet(key, shared){
    try{
      return localStorage.getItem(key);
    }catch(e){ return null; }
  }
  async function sSet(key, value, shared){
    try{
      localStorage.setItem(key, value);
      return true;
    }catch(e){ return false; }
  }
  async function sDelete(key, shared){
    try{
      localStorage.removeItem(key);
      return true;
    }catch(e){ return false; }
  }
  async function sList(prefix, shared){
    try{
      const keys = [];
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if(k && k.startsWith(prefix)) keys.push(k);
      }
      return keys;
    }catch(e){ return []; }
  }

  function uid(){ return 'rec_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8); }
  function todayStr(){
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function fmtDateLabel(iso){
    if(!iso) return '日付未設定';
    const [y,m,d] = iso.split('-');
    const dt = new Date(iso+'T00:00:00');
    const wd = ['日','月','火','水','木','金','土'][dt.getDay()];
    return y+'年'+m+'月'+d+'日（'+wd+'）';
  }
  function esc(s){
    return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function blankRecord(){
    return {
      id:null,
      date: todayStr(),
      projectName: state.shared.projectName || '',
      companyName: state.shared.companyName || '',
      foreman:'',
      supervisorSeal:'', contractorSeal:'', personInChargeSeal:'',
      enteredBy: state.personal.displayName || '',
      workContent:'',
      hazards:[{hazard:'',measure:''},{hazard:'',measure:''},{hazard:'',measure:''}],
      qualified:{}, appointed:{}, ppe:{}, sling:{}, machine:{}, electric:{}, craneLift:{},
      notes:'', result:'',
      workers:[{name:'',qual:''},{name:'',qual:''},{name:'',qual:''}],
      createdAt:null, updatedAt:null,
    };
  }

  /* ---------------- toast / modal ---------------- */
  let toastTimer=null;
  function showToast(msg){
    let el = root.querySelector('.toast');
    if(!el){ el = document.createElement('div'); el.className='toast'; root.appendChild(el); }
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>el.classList.remove('show'), 2200);
  }
  function showConfirm(message, onYes){
    const overlay = document.createElement('div');
    overlay.className='modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <p>${esc(message)}</p>
        <div class="modal-actions">
          <button class="btn btn-ghost btn-sm" id="modalCancel">キャンセル</button>
          <button class="btn btn-danger btn-sm" id="modalOk">削除する</button>
        </div>
      </div>`;
    root.appendChild(overlay);
    overlay.querySelector('#modalCancel').onclick = ()=>overlay.remove();
    overlay.querySelector('#modalOk').onclick = ()=>{ overlay.remove(); onYes(); };
    overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  }

  /* ---------------- init / load ---------------- */
  async function init(){
    renderLoading();
    const [sharedRaw, personalRaw, keys] = await Promise.all([
      sGet('settings:shared', true),
      sGet('settings:personal', false),
      sList('record:', true),
    ]);
    if(sharedRaw){ try{ state.shared = JSON.parse(sharedRaw); }catch(e){} }
    if(personalRaw){ try{ state.personal = JSON.parse(personalRaw); }catch(e){} }

    const recs = await Promise.all(keys.map(k=>sGet(k.startsWith('record:')?k:'record:'+k, true)));
    state.records = recs.filter(Boolean).map(r=>{ try{ return JSON.parse(r); }catch(e){ return null; } }).filter(Boolean);
    state.records.sort((a,b)=> (b.date||'').localeCompare(a.date||'') || (b.createdAt||'').localeCompare(a.createdAt||''));

    state.view = 'list';
    renderList();
  }

  function renderLoading(){
    topbarInner.innerHTML = `
      <div class="stamp-mark">KY</div>
      <div class="brand-text"><h1>KY活動表・作業前点検</h1></div>`;
    mainArea.innerHTML = `<div class="loading-state">読み込み中…</div>`;
  }

  /* ================= LIST VIEW ================= */
  let listFilter = { q:'', date:'' };

  function renderList(){
    topbarInner.innerHTML = `
      <div class="stamp-mark">KY</div>
      <div class="brand-text">
        <h1>KY活動表・作業前点検</h1>
        <input id="projectNameInput" class="project-input" placeholder="工事名を入力" value="${esc(state.shared.projectName)}">
      </div>
      <button class="btn btn-primary" id="newRecordBtn">＋ 新規作成</button>`;

    mainArea.innerHTML = `
      <div class="toolbar">
        <input type="text" class="search-input" id="searchInput" placeholder="作業内容・会社名・職長名で検索" value="${esc(listFilter.q)}">
        <input type="date" class="date-input" id="dateFilterInput" value="${esc(listFilter.date)}">
        <button class="clear-btn" id="clearFilterBtn">条件をクリア</button>
      </div>
      <div class="card-list" id="cardListContainer"></div>`;

    topbarInner.querySelector('#newRecordBtn').onclick = ()=>openForm(null);
    const projInput = topbarInner.querySelector('#projectNameInput');
    projInput.addEventListener('change', async ()=>{
      state.shared.projectName = projInput.value;
      await sSet('settings:shared', JSON.stringify(state.shared), true);
      showToast('工事名を更新しました');
    });

    const searchInput = mainArea.querySelector('#searchInput');
    const dateInput = mainArea.querySelector('#dateFilterInput');
    searchInput.addEventListener('input', ()=>{ listFilter.q = searchInput.value; renderCardList(); });
    dateInput.addEventListener('change', ()=>{ listFilter.date = dateInput.value; renderCardList(); });
    mainArea.querySelector('#clearFilterBtn').onclick = ()=>{
      listFilter = {q:'',date:''};
      searchInput.value=''; dateInput.value='';
      renderCardList();
    };

    renderCardList();
  }

  function recordMatches(r, filter){
    if(filter.date && r.date !== filter.date) return false;
    if(filter.q){
      const q = filter.q.toLowerCase();
      const hay = [r.workContent, r.companyName, r.foreman, r.notes, r.projectName,
        ...(r.hazards||[]).map(h=>h.hazard+' '+h.measure),
        ...(r.workers||[]).map(w=>w.name)].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  }

  function renderCardList(){
    const container = mainArea.querySelector('#cardListContainer');
    const filtered = state.records.filter(r=>recordMatches(r, listFilter));
    if(filtered.length===0){
      container.innerHTML = `
        <div class="empty-state">
          <div class="big">📋</div>
          ${state.records.length===0
            ? '記録がまだありません。「＋ 新規作成」から最初のKY活動表を作成しましょう。'
            : '条件に合う記録が見つかりません。'}
        </div>`;
      return;
    }
    container.innerHTML = filtered.map(r=>{
      const stampClass = r.result==='ok' ? 'ok' : (r.result==='ng' ? 'ng' : 'pending');
      const stampText = r.result==='ok' ? '可' : (r.result==='ng' ? '不可' : '未判定');
      const workerCount = (r.workers||[]).filter(w=>w.name && w.name.trim()).length;
      return `
        <div class="record-card" data-id="${esc(r.id)}">
          <div class="stamp ${stampClass}">${stampText}</div>
          <div class="record-date">${fmtDateLabel(r.date)}</div>
          <div class="record-meta">${esc(r.companyName||'会社名未入力')}${r.foreman?'　職長: '+esc(r.foreman):''}</div>
          <div class="record-work ${r.workContent?'':'empty'}">${r.workContent ? esc(r.workContent) : '作業内容が未入力です'}</div>
          <div class="record-footer"><span>作業員 ${workerCount}名</span><span>${esc(r.projectName||'')}</span></div>
        </div>`;
    }).join('');
    container.querySelectorAll('.record-card').forEach(card=>{
      card.addEventListener('click', ()=>openForm(card.dataset.id));
    });
  }

  /* ================= FORM VIEW ================= */
function openForm(id){

  let rec;

  if(id){
    rec = JSON.parse(JSON.stringify(
      state.records.find(r=>r.id===id)
    ));
  }else{

    const latest = state.records[0];

    if(latest){

      rec = JSON.parse(JSON.stringify(latest));

      rec.id = null;
      rec.date = todayStr();

      rec.workContent = '';
      rec.hazards = [
        {hazard:'',measure:''},
        {hazard:'',measure:''},
        {hazard:'',measure:''}
      ];

      rec.notes = '';
      rec.result = '';

      rec.createdAt = null;
      rec.updatedAt = null;

    }else{
      rec = blankRecord();
    }
  }

  state.currentId = id;
  renderForm(rec, !id);
}

  function checklistGroupHtml(group, data){
    data = data || {};
    return `
      <div class="chk-group">
        <div class="chk-group-title">${esc(group.title)}</div>
        <div class="chk-list">
          ${group.items.map(item=>{
            const checked = !!data[item.id];
            const detailId = item.detail ? `det_${group.key}_${item.detail.id}` : '';
            const detailVal = item.detail ? (data[item.detail.id]||'') : '';
            return `
              <div class="chk-item-wrap">
                <label class="chk">
                  <input type="checkbox" data-group="${group.key}" data-id="${item.id}"
                    ${item.detail?`data-detail-target="${detailId}"`:''} ${checked?'checked':''}>
                  ${esc(item.label)}
                </label>
                ${item.detail ? `<input type="text" class="detail-input ${checked?'':'hidden'}" id="${detailId}"
                  data-group="${group.key}" data-detailid="${item.detail.id}"
                  placeholder="${esc(item.detail.placeholder)}" value="${esc(detailVal)}">` : ''}
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  function hazardRowHtml(h, i){
    h = h || {hazard:'',measure:''};
    return `
      <div class="hazard-row" data-row>
        <div class="row-num">${i+1}</div>
        <textarea class="hazard-input" placeholder="どんな危険が潜んでいるか" rows="2">${esc(h.hazard)}</textarea>
        <textarea class="measure-input" placeholder="だから私達はこうします" rows="2">${esc(h.measure)}</textarea>
        <button type="button" class="row-remove" title="削除">✕</button>
      </div>`;
  }
  function workerRowHtml(w, i){
    w = w || {name:'',qual:''};
    return `
      <div class="worker-row" data-row>
        <div class="row-num">${i+1}</div>
        <input type="text" class="worker-name" placeholder="氏名" value="${esc(w.name)}">
        <select class="worker-qual">
          ${QUAL_CODES.map(c=>`<option value="${c}" ${c===w.qual?'selected':''}>${c||'-'}</option>`).join('')}
        </select>
        <button type="button" class="row-remove" title="削除">✕</button>
      </div>`;
  }

  function renumber(container, selector){
    container.querySelectorAll(selector).forEach((row, idx)=>{
      const numEl = row.querySelector('.row-num');
      if(numEl) numEl.textContent = idx+1;
    });
  }

  function updateWorkerCountHint(){
    const wrap = mainArea.querySelector('#workersContainer');
    const hint = mainArea.querySelector('#workerCountHint');
    if(!wrap || !hint) return;
    const n = [...wrap.querySelectorAll('.worker-name')].filter(i=>i.value.trim()).length;
    hint.textContent = '現在の入力人数: ' + n + ' 名';
  }

  function renderForm(rec, isNew){
    topbarInner.innerHTML = `
      <button class="back-btn" id="backBtn">‹</button>
      <div class="brand-text">
        <h1 style="opacity:.7">${isNew?'新規作成':'記録の編集'}</h1>
      </div>
      ${!isNew ? '<button class="btn btn-ghost btn-sm" id="printBtn">🖨 印刷</button>' : ''}`;

    mainArea.innerHTML = `
      <div class="form-title">${fmtDateLabel(rec.date)}</div>
      <div class="form-subtitle">${isNew ? '新しいKY活動表・作業開始前点検表を作成します' : '内容を編集して保存できます'}</div>

      <div class="section">
        <div class="section-head">基本情報</div>
        <div class="section-body">
          <div class="row2">
            <div class="field"><label>日付</label><input type="date" id="f_date" value="${esc(rec.date)}"></div>
            <div class="field"><label>工事名</label><input type="text" id="f_projectName" value="${esc(rec.projectName)}" placeholder="工事名"></div>
          </div>
          <div class="row2">
  <div class="field">
    <label>開始時間</label>
    <input type="time" id="f_startTime">
  </div>

  <div class="field">
    <label>終了時間</label>
    <input type="time" id="f_endTime">
  </div>
</div>
          <div class="row2">
            <div class="field"><label>会社名</label><input type="text" id="f_companyName" value="${esc(rec.companyName)}"></div>
            <div class="field"><label>職長</label><input type="text" id="f_foreman" value="${esc(rec.foreman)}"></div>
          </div>
          <div class="row3">
            <div class="field"><label>統責者</label><input type="text" id="f_supervisorSeal" value="${esc(rec.supervisorSeal)}"></div>
            <div class="field"><label>元方者</label><input type="text" id="f_contractorSeal" value="${esc(rec.contractorSeal)}"></div>
            <div class="field"><label>担当者</label><input type="text" id="f_personInChargeSeal" value="${esc(rec.personInChargeSeal)}"></div>
          </div>
          <div class="field"><label>入力者（あなたの名前）</label><input type="text" id="f_enteredBy" value="${esc(rec.enteredBy)}" placeholder="記録者名"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-head">本日の作業内容</div>
        <div class="section-body">
          <textarea id="f_workContent" rows="3" placeholder="本日行う作業の内容を記入してください">${esc(rec.workContent)}</textarea>
        </div>
      </div>

      <div class="section">
        <div class="section-head">危険予知（どんな危険が潜んでいるか／だから私達はこうします）</div>
        <div class="section-body">
          <div class="hazard-cols-label"><div></div><div>危険のポイント</div><div>私たちの対策</div><div></div></div>
          <div id="hazardsContainer"></div>
          <button type="button" class="add-row-btn" id="addHazardBtn">＋ 項目を追加</button>
        </div>
      </div>

      <div class="section">
        <div class="section-head">確認チェックリスト</div>
        <div class="section-body">
          <div class="chk-groups" id="checklistContainer"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-head">記事・判定</div>
        <div class="section-body">
          <div class="field"><label>記事（特記事項）</label><textarea id="f_notes" rows="2">${esc(rec.notes)}</textarea></div>
          <label style="font-size:12px;color:var(--ink-soft);font-weight:700;">点検結果</label>
          <div class="result-toggle" id="resultToggle" data-value="${esc(rec.result)}">
            <button type="button" class="result-btn result-ok ${rec.result==='ok'?'active':''}" data-value="ok">✓ 可（問題なし）</button>
            <button type="button" class="result-btn result-ng ${rec.result==='ng'?'active':''}" data-value="ng">✕ 不可（要対応）</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-head">本日の作業員名簿</div>
        <div class="section-body">
          <div id="workersContainer"></div>
          <div class="worker-count-hint" id="workerCountHint"></div>
          <button type="button" class="add-row-btn" id="addWorkerBtn">＋ 作業員を追加</button>
          <div style="font-size:11px;color:var(--ink-soft);margin-top:8px;">※ 資格略号　主＝作業主任者　揮＝作業指揮者　監＝監視員　誘＝誘導員　合＝合図者</div>
        </div>
      </div>

      <div class="save-bar">
        <button class="btn btn-primary btn-block" id="saveBtn">${isNew?'保存する':'更新を保存'}</button>
        ${!isNew ? '<button class="btn btn-danger btn-sm" id="deleteBtn">削除</button>' : ''}
      </div>
    `;

    // populate dynamic sections
    const hazardsContainer = mainArea.querySelector('#hazardsContainer');
    (rec.hazards && rec.hazards.length ? rec.hazards : [{hazard:'',measure:''}]).forEach((h,i)=>{
      hazardsContainer.insertAdjacentHTML('beforeend', hazardRowHtml(h,i));
    });
    const workersContainer = mainArea.querySelector('#workersContainer');
    (rec.workers && rec.workers.length ? rec.workers : [{name:'',qual:''}]).forEach((w,i)=>{
      workersContainer.insertAdjacentHTML('beforeend', workerRowHtml(w,i));
    });
    const checklistContainer = mainArea.querySelector('#checklistContainer');
    checklistContainer.innerHTML = CHECK_GROUPS.map(g=>checklistGroupHtml(g, rec[g.key])).join('');

    updateWorkerCountHint();

    /* ---- event wiring ---- */
    topbarInner.querySelector('#backBtn').onclick = ()=>{ state.view='list'; renderList(); };
    const printBtn = topbarInner.querySelector('#printBtn');
    if(printBtn) printBtn.onclick = ()=>window.print();

    mainArea.querySelector('#addHazardBtn').onclick = ()=>{
      const n = hazardsContainer.querySelectorAll('.hazard-row').length;
      hazardsContainer.insertAdjacentHTML('beforeend', hazardRowHtml(null, n));
      renumber(hazardsContainer, '.hazard-row');
    };
    hazardsContainer.addEventListener('click', e=>{
      const btn = e.target.closest('.row-remove');
      if(!btn) return;
      const rows = hazardsContainer.querySelectorAll('.hazard-row');
      if(rows.length<=1){ showToast('最低1項目は必要です'); return; }
      btn.closest('.hazard-row').remove();
      renumber(hazardsContainer, '.hazard-row');
    });

    mainArea.querySelector('#addWorkerBtn').onclick = ()=>{
      const n = workersContainer.querySelectorAll('.worker-row').length;
      workersContainer.insertAdjacentHTML('beforeend', workerRowHtml(null, n));
      renumber(workersContainer, '.worker-row');
      updateWorkerCountHint();
    };
    workersContainer.addEventListener('click', e=>{
      const btn = e.target.closest('.row-remove');
      if(!btn) return;
      const rows = workersContainer.querySelectorAll('.worker-row');
      if(rows.length<=1){ showToast('最低1行は必要です'); return; }
      btn.closest('.worker-row').remove();
      renumber(workersContainer, '.worker-row');
      updateWorkerCountHint();
    });
    workersContainer.addEventListener('input', e=>{
      if(e.target.classList.contains('worker-name')) updateWorkerCountHint();
    });

    checklistContainer.addEventListener('change', e=>{
      if(e.target.matches('input[type=checkbox][data-detail-target]')){
        const target = document.getElementById(e.target.dataset.detailTarget);
        if(target){
          target.classList.toggle('hidden', !e.target.checked);
          if(e.target.checked) target.focus();
        }
      }
    });

    const resultToggle = mainArea.querySelector('#resultToggle');
    resultToggle.querySelectorAll('.result-btn').forEach(btn=>{
      btn.onclick = ()=>{
        const cur = resultToggle.dataset.value === btn.dataset.value ? '' : btn.dataset.value;
        resultToggle.dataset.value = cur;
        resultToggle.querySelectorAll('.result-btn').forEach(b=>b.classList.toggle('active', b.dataset.value===cur));
      };
    });

    mainArea.querySelector('#saveBtn').onclick = ()=>saveCurrentForm(rec.id, isNew);
    const deleteBtn = mainArea.querySelector('#deleteBtn');
    if(deleteBtn) deleteBtn.onclick = ()=>{
      showConfirm('この記録を削除します。元に戻せません。よろしいですか？', async ()=>{
        await sDelete('record:'+rec.id, true);
        state.records = state.records.filter(r=>r.id!==rec.id);
        showToast('削除しました');
        state.view='list'; renderList();
      });
    };

    state.view='form';
  }

  function collectFormData(){
    const get = id => mainArea.querySelector('#'+id);
    const data = {
      date: get('f_date').value || todayStr(),
      projectName: get('f_projectName').value.trim(),
      companyName: get('f_companyName').value.trim(),
      foreman: get('f_foreman').value.trim(),
      supervisorSeal: get('f_supervisorSeal').value.trim(),
      contractorSeal: get('f_contractorSeal').value.trim(),
      personInChargeSeal: get('f_personInChargeSeal').value.trim(),
      enteredBy: get('f_enteredBy').value.trim(),
      workContent: get('f_workContent').value.trim(),
      notes: get('f_notes').value.trim(),
      result: mainArea.querySelector('#resultToggle').dataset.value || '',
    };
    data.hazards = [...mainArea.querySelectorAll('.hazard-row')].map(row=>({
      hazard: row.querySelector('.hazard-input').value.trim(),
      measure: row.querySelector('.measure-input').value.trim(),
    }));
    data.workers = [...mainArea.querySelectorAll('.worker-row')].map(row=>({
      name: row.querySelector('.worker-name').value.trim(),
      qual: row.querySelector('.worker-qual').value,
    }));
    CHECK_GROUPS.forEach(g=>{
      const obj = {};
      g.items.forEach(item=>{
        const chk = mainArea.querySelector(`input[data-group="${g.key}"][data-id="${item.id}"]`);
        obj[item.id] = !!(chk && chk.checked);
        if(item.detail){
          const det = mainArea.querySelector(`[data-group="${g.key}"][data-detailid="${item.detail.id}"]`);
          obj[item.detail.id] = det ? det.value.trim() : '';
        }
      });
      data[g.key] = obj;
    });
    return data;
  }

  async function saveCurrentForm(existingId, isNew){
    const saveBtn = mainArea.querySelector('#saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = '保存中…';

    const formData = collectFormData();
    const now = new Date().toISOString();
    let record;
    if(isNew){
      record = Object.assign(blankRecord(), formData, { id: uid(), createdAt: now, updatedAt: now });
    }else{
      const old = state.records.find(r=>r.id===existingId) || {};
      record = Object.assign({}, old, formData, { id: existingId, updatedAt: now });
    }

    const ok = await sSet('record:'+record.id, JSON.stringify(record), true);
    if(!ok){
      saveBtn.disabled=false; saveBtn.textContent = isNew?'保存する':'更新を保存';
      showToast('保存に失敗しました。通信状態を確認して再度お試しください。');
      return;
    }

    // persist convenient defaults
    const newShared = { projectName: formData.projectName, companyName: formData.companyName };
    if(newShared.projectName !== state.shared.projectName || newShared.companyName !== state.shared.companyName){
      state.shared = newShared;
      sSet('settings:shared', JSON.stringify(state.shared), true);
    }
    if(formData.enteredBy && formData.enteredBy !== state.personal.displayName){
      state.personal.displayName = formData.enteredBy;
      sSet('settings:personal', JSON.stringify(state.personal), false);
    }

    const idx = state.records.findIndex(r=>r.id===record.id);
    if(idx>=0) state.records[idx] = record; else state.records.push(record);
    state.records.sort((a,b)=> (b.date||'').localeCompare(a.date||'') || (b.createdAt||'').localeCompare(a.createdAt||''));
try {
  const res = await fetch("https://script.google.com/macros/s/AKfycbyg8edPw2LGJbbywNin2g3a0ubaDJwmzbwoThyaULugyNA-aSTAEfis2y3SyxAz1RsB3Q/exec", {
method: "POST",
  body: JSON.stringify(record)
});

const text = await res.text();
console.log(text);
  console.log("GAS response:", text);
} catch (err) {
  console.error("GAS送信エラー:", err);
  showToast("クラウド保存に失敗（GAS接続）");
}
    showToast('保存しました');
    state.view='list';
    renderList();
  }

  init();
})();
</script>

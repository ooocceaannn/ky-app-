<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>現場安全管理</title>
</head>
<body>
<style>
  :root{
    --bg:#EDE7D8;--surface:#FFFFFF;--surface-alt:#F7F3E8;--border:#CBC0A1;
    --ink:#211F1A;--ink-soft:#6B6452;--navy:#142233;--navy-soft:#1E3450;
    --orange:#E2611B;--orange-soft:#F4A876;--red:#AD2B1F;--green:#2C6B3F;
    --radius:10px;
    --font-body:"Hiragino Sans","Noto Sans JP","Yu Gothic","Meiryo",sans-serif;
    --font-mono:"SF Mono","Consolas","Menlo",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);}
  #app{
    font-family:var(--font-body);color:var(--ink);
    background:var(--bg);
    background-image:linear-gradient(var(--border) 1px,transparent 1px);
    background-size:100% 28px;background-position:0 92px;
    min-height:100svh;padding-bottom:60px;
  }
  #app .container{max-width:760px;margin:0 auto;padding:0 14px;}
  #app button{font-family:inherit;cursor:pointer;}
  #app input,#app select,#app textarea{font-family:inherit;color:var(--ink);}

  /* topbar */
  #app .topbar{background:var(--navy);color:#fff;position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.3);}
  #app .topbar-inner{display:flex;align-items:center;gap:10px;padding:10px 14px 6px;max-width:760px;margin:0 auto;}
  #app .stamp-mark{flex:none;width:38px;height:38px;border-radius:8px;background:var(--orange);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;transform:rotate(-5deg);box-shadow:0 2px 0 rgba(0,0,0,.3);text-align:center;line-height:1.1;}
  #app .site-name{flex:1;min-width:0;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.9;}
  #app .site-name.empty{opacity:.5;font-style:italic;font-size:13px;}
  #app .gear-btn{flex:none;background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;padding:4px 6px;line-height:1;border-radius:6px;}
  #app .gear-btn:active{background:rgba(255,255,255,.15);}
  #app .back-btn{flex:none;background:none;border:none;color:#fff;font-size:24px;padding:4px 8px;line-height:1;border-radius:6px;}
  #app .back-btn:active{background:rgba(255,255,255,.15);}
  #app .topbar-title{flex:1;min-width:0;}
  #app .topbar-title h1{font-size:13px;font-weight:700;letter-spacing:.06em;opacity:.8;}

  /* tab bar */
  #app .tab-bar{display:flex;border-top:1px solid rgba(255,255,255,.12);padding:0 14px;max-width:760px;margin:0 auto;}
  #app .tab-btn{flex:1;background:none;border:none;color:rgba(255,255,255,.5);font-family:inherit;font-size:12px;font-weight:700;padding:7px 2px 9px;border-bottom:3px solid transparent;letter-spacing:.03em;}
  #app .tab-btn.active{color:#fff;border-bottom-color:var(--orange);}

  /* buttons */
  #app .btn{border:none;border-radius:999px;padding:10px 18px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-family:inherit;}
  #app .btn-primary{background:var(--orange);color:#fff;box-shadow:0 2px 0 rgba(0,0,0,.2);}
  #app .btn-primary:active{transform:translateY(1px);box-shadow:none;}
  #app .btn-primary:disabled{opacity:.6;}
  #app .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--ink);}
  #app .btn-danger{background:var(--red);color:#fff;}
  #app .btn-navy{background:var(--navy-soft);color:#fff;}
  #app .btn-sm{padding:7px 13px;font-size:13px;}
  #app .btn-block{width:100%;justify-content:center;}

  /* toolbar */
  #app .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 10px;align-items:center;}
  #app .search-input{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:10px 16px;font-size:14px;}
  #app .date-input{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:10px 14px;font-size:13px;color:var(--ink-soft);}
  #app .clear-btn{background:none;border:none;color:var(--ink-soft);font-size:13px;text-decoration:underline;font-family:inherit;}

  /* date accordion */
  #app .date-group{margin-bottom:10px;}
  #app .date-group-hd{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;background:var(--navy-soft);color:#fff;
    border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;user-select:none;
  }
  #app .date-group-hd.today{background:var(--orange);}
  #app .date-group-arrow{display:inline-block;transition:transform .2s;font-size:10px;margin-left:4px;}
  #app .date-group-hd[aria-expanded="true"] .date-group-arrow{transform:rotate(180deg);}
  #app .date-group-body{display:none;padding-top:8px;}
  #app .date-group-body.open{display:block;}

  /* cards */
  #app .card-list{display:flex;flex-direction:column;gap:10px;}
  #app .record-card{
    position:relative;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:14px 16px;padding-right:76px;
    box-shadow:0 1px 0 rgba(0,0,0,.04);border-left:4px solid var(--orange);cursor:pointer;
  }
  #app .record-card.shinki-card{border-left-color:var(--navy-soft);}
  #app .record-card.readonly-card{cursor:default;}
  #app .record-card.readonly-card:active{background:var(--surface);}
  #app .record-card:active{background:var(--surface-alt);}
  #app .record-date{font-family:var(--font-mono);font-weight:700;font-size:13px;color:var(--navy-soft);letter-spacing:.02em;}
  #app .record-meta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  #app .record-name{font-size:15px;font-weight:700;margin-top:6px;}
  #app .record-work{font-size:14px;margin-top:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  #app .record-work.empty{color:var(--ink-soft);font-style:italic;}
  #app .record-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:var(--ink-soft);}
  #app .stamp{position:absolute;top:14px;right:12px;width:48px;height:48px;border-radius:50%;border:2px solid var(--ink-soft);display:flex;align-items:center;justify-content:center;transform:rotate(-9deg);font-weight:800;font-size:11px;text-align:center;opacity:.85;}
  #app .stamp.ok{border-color:var(--green);color:var(--green);}
  #app .stamp.ng{border-color:var(--red);color:var(--red);}
  #app .stamp.pending{border-color:var(--ink-soft);color:var(--ink-soft);}
  #app .empty-state{text-align:center;padding:50px 20px;color:var(--ink-soft);}
  #app .empty-state .big{font-size:34px;margin-bottom:8px;}

  /* form */
  #app .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-top:16px;overflow:hidden;}
  #app .section-head{background:var(--navy-soft);color:#fff;padding:9px 14px;font-weight:700;font-size:13px;letter-spacing:.08em;}
  #app .section-body{padding:14px;}
  #app .field{margin-bottom:12px;}
  #app .field:last-child{margin-bottom:0;}
  #app .field label{display:block;font-size:12px;color:var(--ink-soft);font-weight:700;margin-bottom:4px;}
  #app .field input[type=text],#app .field input[type=date],#app .field input[type=time],
  #app .field input[type=tel],#app .field input[type=number],#app .field textarea{
    width:100%;border:1px solid var(--border);border-radius:6px;padding:9px 10px;font-size:14px;background:var(--surface-alt);
  }
  #app .field textarea{resize:vertical;min-height:64px;}
  #app .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  #app .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

  /* hazard rows */
  #app .hazard-cols-label{display:grid;grid-template-columns:22px 1fr 1fr 28px;gap:8px;font-size:11px;color:var(--ink-soft);margin-bottom:4px;}
  #app .hazard-row{display:grid;grid-template-columns:22px 1fr 1fr 28px;gap:8px;align-items:start;margin-bottom:8px;}
  #app .hazard-row textarea{min-height:54px;}
  #app .row-num{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);padding-top:10px;text-align:center;}
  #app .row-remove{background:none;border:none;color:var(--red);font-size:16px;padding-top:6px;font-family:inherit;}
  @media(max-width:560px){
    #app .hazard-cols-label{display:none;}
    #app .hazard-row{grid-template-columns:18px 1fr 28px;}
    #app .hazard-row .measure-input{grid-column:2;}
  }

  /* worker rows */
  #app .worker-row{display:grid;grid-template-columns:22px 1fr 28px;gap:8px;align-items:center;margin-bottom:8px;}
  #app .worker-count-hint{font-size:12px;color:var(--ink-soft);margin-top:-4px;margin-bottom:10px;}
  #app .add-row-btn{margin-top:4px;background:none;border:1px dashed var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--navy-soft);font-weight:700;font-family:inherit;}

  /* result toggle */
  #app .result-toggle{display:flex;gap:10px;margin-top:6px;}
  #app .result-btn{flex:1;border:2px solid var(--border);border-radius:8px;padding:12px;font-weight:700;background:var(--surface-alt);font-size:14px;font-family:inherit;}
  #app .result-btn.active.result-ok{border-color:var(--green);background:#E5F1E7;color:var(--green);}
  #app .result-btn.active.result-ng{border-color:var(--red);background:#F7E7E5;color:var(--red);}

  /* yes/no toggle */
  #app .yn-toggle{display:flex;gap:8px;margin-top:4px;}
  #app .yn-btn{flex:1;border:2px solid var(--border);border-radius:8px;padding:9px;font-weight:700;background:var(--surface-alt);font-size:14px;font-family:inherit;}
  #app .yn-btn.active{border-color:var(--orange);background:#FEF0E6;color:var(--orange);}

  /* qualification checkboxes */
  #app .qual-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
  #app .qual-item{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--bg);}
  #app .qual-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--orange);flex:none;}
  #app .qual-item label{font-size:13px;cursor:pointer;line-height:1.3;}
  @media(max-width:500px){#app .qual-grid{grid-template-columns:1fr;}}

  /* save bar */
  #app .save-bar{position:sticky;bottom:0;background:var(--bg);padding:14px 0 18px;display:flex;gap:10px;border-top:1px solid var(--border);margin-top:18px;}

  /* photo */
  #app .photo-preview{
    width:100%;min-height:200px;border-radius:10px;
    background:var(--surface-alt);border:2px dashed var(--border);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;cursor:pointer;margin-bottom:14px;
  }
  #app .photo-preview img{width:100%;height:100%;object-fit:cover;display:block;}
  #app .ph-hint{color:var(--ink-soft);text-align:center;line-height:1.8;padding:20px;}
  #app .ph-icon{font-size:36px;display:block;}

  /* overview */
  #app .ov-row{display:flex;gap:10px;margin-bottom:8px;font-size:14px;line-height:1.4;}
  #app .ov-row:last-child{margin-bottom:0;}
  #app .ov-label{color:var(--ink-soft);font-size:12px;font-weight:700;min-width:80px;padding-top:2px;flex:none;}
  #app .ov-value{flex:1;}
  #app .ov-pre{white-space:pre-wrap;font-size:13px;line-height:1.7;background:var(--surface-alt);border-radius:6px;padding:10px 12px;}

  /* settings drawer */
  #app .settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
  #app .settings-drawer{background:var(--bg);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:760px;max-height:92svh;display:flex;flex-direction:column;overflow:hidden;}
  #app .settings-handle{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;background:var(--navy);color:#fff;font-weight:700;font-size:15px;}
  #app .settings-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:22px;font-family:inherit;line-height:1;}
  #app .settings-scroll{flex:1;overflow-y:auto;padding:14px;}
  #app .site-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;}
  #app .site-card.active-site{border-color:var(--orange);border-width:2px;}
  #app .site-card-name{font-size:16px;font-weight:700;margin-bottom:4px;}
  #app .site-card-badge{display:inline-block;background:var(--orange);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:8px;}
  #app .site-card-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  #app .sfield{margin-bottom:14px;}
  #app .sfield label{display:block;font-size:12px;color:var(--ink-soft);font-weight:700;margin-bottom:4px;}
  #app .sfield input,#app .sfield textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:9px 10px;font-size:14px;background:var(--surface);font-family:inherit;}
  #app .sfield textarea{resize:vertical;min-height:80px;}
  #app .stitle{font-size:11px;font-weight:700;color:var(--ink-soft);letter-spacing:.1em;padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:12px;}

  /* toast / modal */
  #app .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.3);opacity:0;transition:opacity .25s;pointer-events:none;}
  #app .toast.show{opacity:1;}
  #app .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
  #app .modal-box{background:#fff;border-radius:var(--radius);padding:20px;max-width:340px;width:100%;}
  #app .modal-box p{font-size:14px;margin:0 0 16px;line-height:1.5;}
  #app .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
  #app .loading-state{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  #app .form-title{font-size:17px;font-weight:700;margin:14px 0 0;}
  #app .form-subtitle{font-size:12px;color:var(--ink-soft);margin:2px 0 0;}
  #app .setup-screen{text-align:center;padding:60px 20px;}
  #app .setup-screen .icon{font-size:48px;margin-bottom:16px;}
  #app .setup-screen p{color:var(--ink-soft);margin-bottom:20px;line-height:1.6;}

  @media(max-width:768px){
    #app .row2,#app .row3{grid-template-columns:1fr;}
    #app input,#app textarea,#app select{font-size:16px;}
    #app .btn{min-height:44px;}
  }
  @media print{
    #app .topbar,#app .save-bar,#app .toolbar,#app .row-remove,#app .add-row-btn,#app .btn{display:none !important;}
    #app{background:#fff;}
    #app .section{border:1px solid #999;break-inside:avoid;}
    #app input,#app textarea{background:transparent !important;border:none !important;}
  }
</style>

<div id="app">
  <div class="topbar" id="topbar">
    <div class="topbar-inner" id="topbarInner"></div>
    <div id="tabBarWrap"><div class="tab-bar" id="tabBar"></div></div>
  </div>
  <div class="container" id="mainArea"></div>
</div>

<script>
(function(){
  const appEl=document.getElementById('app');
  const tbInner=document.getElementById('topbarInner');
  const tabBarWrap=document.getElementById('tabBarWrap');
  const tabBar=document.getElementById('tabBar');
  const mainArea=document.getElementById('mainArea');

  /* ---- CONSTANTS ---- */
  /* ============================================================
     ★ デプロイ時にここを設定する（業者含む全員に適用）
  ============================================================ */
  const DEFAULT_WEBHOOK   = 'https://script.google.com/macros/s/AKfycbys7SnztOhakk_vy_DfDHleyys4qh9Xd8gIcaOX_RPMDYA7I-Fvd8cyAbHwk1zz_Wr5bQ/exec'; // ← GASのWebhook URLをここに貼る
  const DEFAULT_SITE_NAME = 'コメリBHG小出店増改修工事'; // ← 現場名をここに入れる（例: '○○新築工事'）
  const DEFAULT_IMGBB_KEY = '3850099d7011120d695b1c72fc969289'; // ← ImgBBのAPIキーをここに貼る
  /* ============================================================ */

  const TABS=[
    {id:'ky',   label:'KY活動'},
    {id:'shinki',label:'新規入場'},
    {id:'photo', label:'写真報告'},
    {id:'overview',label:'概要'},
  ];

  const QUALIFICATIONS=[
    '玉掛業務（1t以上）','玉掛業務（1t未満）',
    'ガス溶接作業主任者（免）','ガス溶接作業主任者（技）',
    '型枠支保工作業主任者','地山掘削作業主任者',
    '土止め支保工作業主任者','鉄骨組立等作業主任者',
    '有機溶剤作業主任者','酸欠危険作業主任者',
    '足場の組立等作業主任者','コンクリート造工作物解体作業主任者',
    'クレーン運転士（免）','電気主任技術者（免）',
    '電気工事士（免）','クレーン運転特別教育（1t未満）',
    '建設用リフト運転特別教育','アーク溶接',
    '車両系建設機械（3t以上）','車両系建設機械（3t未満）',
    '同上基礎工事用（3t以上）','同上基礎工事用（3t未満）',
    '高所作業車（10m以上）','高所作業車（10m未満）',
    '法定職長教育',
  ];

  /* ---- STATE ---- */
  let state={
    tab:'ky',
    config:{currentSiteId:null,sites:[]},
    ky:{
      view:'list',records:[],
      openDates:new Set(),
      openDates:new Set(),
      currentId:null,filter:{q:'',date:''},
      shared:{companyName:''},personal:{displayName:''},
    },
    shinki:{view:'list',records:[],currentId:null,filter:{q:''}},
    overviews:{}, // { [siteId]: {...} } — GASのみが正、localStorageには保存しない
  };

  /* ---- STORAGE ---- */
  function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
  function lsSet(k,v){try{localStorage.setItem(k,v);return true;}catch(e){return false;}}
  function lsDel(k){try{localStorage.removeItem(k);return true;}catch(e){return false;}}
  function lsKeys(p){const a=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(p))a.push(k);}}catch(e){}return a;}

  /* ---- UTILS ---- */
  function uid(p){return (p||'r')+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7);}
  function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function fmtDate(iso){
    if(!iso) return '日付未設定';
    var s=String(iso).trim();
    if(!s.match(/^\d{4}-\d{2}-\d{2}/)){
      try{
        var d=new Date(s);
        if(isNaN(d.getTime())) return s;
        s=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }catch(e){ return s; }
    }
    var parts=s.split('-');
    var wd=['日','月','火','水','木','金','土'][new Date(s+'T00:00:00').getDay()];
    return parts[0]+'年'+Number(parts[1])+'月'+Number(parts[2])+'日（'+wd+'）';
  }
  function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function renumber(c,s){c.querySelectorAll(s).forEach((r,i)=>{const n=r.querySelector('.row-num');if(n)n.textContent=i+1;});}

  /* ---- TOAST / CONFIRM ---- */
  let toastTimer=null;
  function showToast(msg){
    let el=appEl.querySelector('.toast');
    if(!el){el=document.createElement('div');el.className='toast';appEl.appendChild(el);}
    el.textContent=msg;el.classList.add('show');
    clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
  }
  function showConfirm(msg,onYes){
    const ov=document.createElement('div');ov.className='modal-overlay';
    ov.innerHTML=`<div class="modal-box"><p>${esc(msg)}</p><div class="modal-actions"><button class="btn btn-ghost btn-sm" id="mC">キャンセル</button><button class="btn btn-danger btn-sm" id="mO">削除する</button></div></div>`;
    appEl.appendChild(ov);
    ov.querySelector('#mC').onclick=()=>ov.remove();
    ov.querySelector('#mO').onclick=()=>{ov.remove();onYes();};
    ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  }

  /* ---- IMAGE RESIZE ---- */
  function resizePhoto(file){
    return new Promise(resolve=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        const img=new Image();
        img.onload=()=>{
          const MAX=1200,ratio=Math.min(MAX/img.width,MAX/img.height,1);
          const w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);
          const canvas=document.createElement('canvas');
          canvas.width=w;canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          resolve({base64:canvas.toDataURL('image/jpeg',0.82).split(',')[1],mimeType:'image/jpeg',fileName:file.name.replace(/\.[^.]+$/,'.jpg')});
        };
        img.src=ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  /* ---- INIT ---- */
  async function init(){
    renderLoading();
    const cfgRaw=lsGet('app:config');
    if(cfgRaw){try{state.config=JSON.parse(cfgRaw);}catch(e){}}
    if(!state.config.sites)state.config.sites=[];
    if(!state.config.currentSiteId&&state.config.sites.length>0)state.config.currentSiteId=state.config.sites[0].id;
    if(state.config.sites.length===0){
      const oldShared=lsGet('settings:shared');
      if(oldShared){try{const s=JSON.parse(oldShared);if(s.projectName){migrateOld(s);return;}}catch(e){}}
    }
    const kyS=lsGet('ky:shared');if(kyS)try{state.ky.shared=JSON.parse(kyS);}catch(e){}
    const kyP=lsGet('ky:personal');if(kyP)try{state.ky.personal=JSON.parse(kyP);}catch(e){}
    state.ky.records=lsKeys('record:').map(k=>{try{return JSON.parse(lsGet(k));}catch(e){return null;}}).filter(Boolean);
    sortKY();
    state.shinki.records=lsKeys('shinki:').map(k=>{try{return JSON.parse(lsGet(k));}catch(e){return null;}}).filter(Boolean);
    sortShinki();
    await fetchAllOverviews();
    renderApp();
  }

  // webhookが設定されている全現場の概要をGASから取得
  async function fetchAllOverviews(){
    const webhooks=new Set(state.config.sites.map(s=>s.webhook).filter(Boolean));
    if(DEFAULT_WEBHOOK) webhooks.add(DEFAULT_WEBHOOK);
    for(const wh of webhooks){
      await fetchOverviewsFromWebhook(wh);
    }
  }

  // 1つのwebhookから概要を取得（siteId不問、シートの1件目をそのまま使う）
  async function fetchOverviewsFromWebhook(webhook){
    if(!webhook) return;
    try{
      const res=await fetch(webhook,{method:'POST',body:JSON.stringify({type:'fetch_config'})});
      const text=await res.text();
      let parsed;
      try{parsed=JSON.parse(text);}catch(e){console.warn('概要取得: JSONパース失敗');return;}
      if(parsed.success && parsed.overview){
        const targetId=state.config.currentSiteId||'__default__';
        state.overviews[targetId]=parsed.overview;
      }
    }catch(e){console.warn('概要取得失敗:',e);}
  }

  // 現場概要をGASに保存（2行目固定上書き、siteId不問）
  async function saveOverviewToGAS(siteId,siteName,ov,webhook){
    if(!webhook){console.warn('saveOverviewToGAS: webhook未設定');return false;}
    try{
      const res=await fetch(webhook,{method:'POST',body:JSON.stringify({type:'config',siteId,siteName,...ov})});
      const text=await res.text();
      try{const j=JSON.parse(text);return j.success===true;}
      catch(e){console.warn('概要保存: JSONパース失敗',text.slice(0,200));return false;}
    }catch(e){console.warn('概要保存失敗:',e);return false;}
  }

  function migrateOld(old){
    const site=blankSite();site.name=old.projectName||'現場A';
    state.config.sites.push(site);state.config.currentSiteId=site.id;saveConfig();
    state.ky.shared={companyName:old.companyName||''};
    state.ky.records=lsKeys('record:').map(k=>{try{return JSON.parse(lsGet(k));}catch(e){return null;}}).filter(Boolean);sortKY();
    state.shinki.records=lsKeys('shinki:').map(k=>{try{return JSON.parse(lsGet(k));}catch(e){return null;}}).filter(Boolean);sortShinki();
    renderApp();
  }

  function saveConfig(){lsSet('app:config',JSON.stringify(state.config));}
  function currentSite(){
    // 設定済みの現場があればそれを使う
    const s=state.config.sites.find(s=>s.id===state.config.currentSiteId);
    if(s) return s;
    // 未設定でもDEFAULT_WEBHOOKがあれば仮の現場として返す
    if(DEFAULT_WEBHOOK){
      return {id:'__default__',name:DEFAULT_SITE_NAME||'現場',webhook:DEFAULT_WEBHOOK,imgbbKey:DEFAULT_IMGBB_KEY};

  /* ---- APP RENDER ---- */
  function renderApp(){
    const site=currentSite();
    const isForm=(state.tab==='ky'&&state.ky.view==='form')||(state.tab==='shinki'&&state.shinki.view==='form');
    if(isForm){tabBarWrap.style.display='none';}
    else{renderMainTopbar(site);renderTabBar();tabBarWrap.style.display='block';}

    if(state.tab==='ky'){if(state.ky.view==='list')renderKYList();else renderKYForm(state.ky._rec,state.ky._isNew);}
    else if(state.tab==='shinki'){if(state.shinki.view==='list')renderShinkiList();else renderShinkiForm(state.shinki._rec,state.shinki._isNew);}

  /* KY shared fetch */
  /* ================================================================
     KY MODULE — 再設計版
     ・今日の全員分 → GASから取得（今日のみ）→ 読み取り専用カード
     ・自分の記録   → localStorage → 編集可能カード
     ・isShared分岐を廃止、非同期の混乱を排除
  ================================================================ */

  // 今日のKYをGASから取得（今日のデータのみ返す設計）
  async function fetchTodayKY(){
    const site=currentSite();
    if(!site?.webhook) return {ok:false, error:'Webhook URLが設定されていません'};
    try{
      const controller=new AbortController();
      const timer=setTimeout(()=>controller.abort(),10000); // 10秒タイムアウト
      const res=await fetch(site.webhook,{
        method:'POST',
        body:JSON.stringify({type:'fetch_ky'}),
        signal:controller.signal,
      });
      clearTimeout(timer);
      const text=await res.text();
      let parsed;
      try{ parsed=JSON.parse(text); }
      catch(e){
        console.error('fetch_ky: JSONパース失敗',text.slice(0,300));
        return {ok:false, error:'GASの応答がJSONではありません。再デプロイを確認してください。'};
      }
      if(parsed.success && Array.isArray(parsed.records)){
        return {ok:true, records:parsed.records};
      }
      return {ok:false, error:'GASエラー: '+(parsed.error||JSON.stringify(parsed).slice(0,100))};
    }catch(err){
      if(err.name==='AbortError') return {ok:false, error:'タイムアウトしました（10秒）'};
      return {ok:false, error:'通信エラー: '+err.message};
    }
  }

  // KYカードHTML（shared=読み取り専用、mine=編集可）
  function kyCardHtml(r, opts){
    opts=opts||{};
    const sc=r.result==='ok'?'ok':r.result==='ng'?'ng':'pending';
    const st=r.result==='ok'?'可':r.result==='ng'?'不可':'未判定';
    let wLabel='';
    if(typeof r.workers==='string') wLabel=r.workers.split('、').filter(Boolean).length+'名';
    else if(Array.isArray(r.workers)) wLabel=r.workers.filter(w=>w&&w.name).length+'名';
    return `<div class="record-card${opts.readonly?' readonly-card':''}" ${opts.readonly?'':` data-id="${esc(r.id||'')}"`}>
      <div class="stamp ${sc}">${st}</div>
      <div class="record-date">${fmtDate(r.date)}</div>
      <div class="record-meta">${esc(r.companyName||'会社名未入力')}${r.foreman?'　職長: '+esc(r.foreman):''}</div>
      <div class="record-work ${r.workContent?'':'empty'}">${r.workContent?esc(r.workContent):'作業内容が未入力です'}</div>
      <div class="record-footer"><span>${wLabel?'作業員 '+wLabel:''}</span><span>${esc(r.enteredBy||r.projectName||'')}</span></div>
    </div>`;
  }

    mainArea.innerHTML=`

            : '<div class="empty-state" style="padding:20px;"><span style="font-size:13px;">Webhook URLを設定するとここに全員のKYが表示されます。</span></div>'}
        </div>

        <!-- 自分の記録 -->
        <div style="font-size:12px;font-weight:700;color:var(--ink-soft);letter-spacing:.08em;margin-bottom:8px;">📋 自分の記録</div>
        ${myTodayHtml
          ? `<div class="card-list" id="kyMyToday" style="margin-bottom:12px;">${myTodayHtml}</div>`
          : `<div style="font-size:13px;color:var(--ink-soft);margin-bottom:12px;">今日の記録はまだありません。「＋ 新規」から作成してください。</div>`}
        ${myPastHtml
          ? `<div id="kyMyPast">${myPastHtml}</div>`
          : ''}
      </div>`;

    // ボタン類のイベント
    tbInner.querySelector('#kyNewBtn').onclick=()=>openKYForm(null);

    // 自分の記録カードのクリック（編集）
    mainArea.querySelectorAll('.record-card[data-id]').forEach(c=>{
      c.addEventListener('click',()=>openKYForm(c.dataset.id));
    });

    // 過去の記録アコーディオン
    mainArea.querySelectorAll('.date-group-hd').forEach(hd=>{
      hd.onclick=()=>{
        const d=hd.dataset.date;
        const body=hd.nextElementSibling;
        const nowOpen=body.classList.contains('open');
        body.classList.toggle('open',!nowOpen);
        hd.setAttribute('aria-expanded',String(!nowOpen));
        if(nowOpen) state.ky.openDates.delete(d); else state.ky.openDates.add(d);
      };
    });

    // 更新ボタン
    const rf=mainArea.querySelector('#kyRefresh');
    if(rf) rf.onclick=()=>loadTodaySharedKY();

    // GASから今日の全員分を非同期で取得・差し込み
    if(site?.webhook) loadTodaySharedKY();
  }

  // 今日の全員分をGASから取得してDOMに差し込む（独立した非同期処理）
  function loadTodaySharedKY(){
    const container=mainArea.querySelector('#kyTodayShared');
    if(!container) return; // 画面が変わっていたら何もしない
    const rf=mainArea.querySelector('#kyRefresh');
    if(rf){rf.disabled=true;rf.textContent='取得中…';}
    container.innerHTML='<div class="loading-state" style="padding:30px 0;">取得中…</div>';

    fetchTodayKY().then(function(result){
      // DOMがまだあるか確認（タブ切替などで消えている場合は何もしない）
      const c=mainArea.querySelector('#kyTodayShared');
      if(!c) return;
      if(rf){rf.disabled=false;rf.textContent='↺ 更新';}

      if(!result.ok){
        c.innerHTML=`<div style="background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--red);border-radius:8px;padding:14px;">
          <div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:6px;">⚠ 取得できませんでした</div>
          <div style="font-size:12px;color:var(--ink-soft);">${esc(result.error)}</div>
        </div>`;
        return;
      }

      if(result.records.length===0){
        c.innerHTML='<div style="font-size:13px;color:var(--ink-soft);padding:14px 0;">今日のKY記録はまだありません。</div>';
        return;
      }

      c.innerHTML='<div class="card-list">'+result.records.map(function(r){ return kyCardHtml(r,{readonly:true}); }).join('')+'</div>';
    }).catch(function(err){
      const c=mainArea.querySelector('#kyTodayShared');
      if(!c) return;
      if(rf){rf.disabled=false;rf.textContent='↺ 更新';}
      c.innerHTML=`<div style="font-size:13px;color:var(--red);padding:14px 0;">予期せぬエラー: ${esc(err.message)}</div>`;
    });
  }

  async function saveKYRecord(existingId,isNew){
    const btn=mainArea.querySelector('#kySaveBtn');
    btn.disabled=true;btn.textContent='保存中…';
    const fd=collectKYData();
    const now=new Date().toISOString();
    let record;
    if(isNew){record=Object.assign(blankKYRecord(),fd,{id:uid('ky'),siteId:state.config.currentSiteId,createdAt:now,updatedAt:now});}
    else{const old=state.ky.records.find(r=>r.id===existingId)||{};record=Object.assign({},old,fd,{id:existingId,updatedAt:now});}

    lsSet('record:'+record.id,JSON.stringify(record));
    if(fd.companyName!==state.ky.shared.companyName){state.ky.shared.companyName=fd.companyName;lsSet('ky:shared',JSON.stringify(state.ky.shared));}
    if(fd.enteredBy&&fd.enteredBy!==state.ky.personal.displayName){state.ky.personal.displayName=fd.enteredBy;lsSet('ky:personal',JSON.stringify(state.ky.personal));}
    const idx=state.ky.records.findIndex(r=>r.id===record.id);
    if(idx>=0)state.ky.records[idx]=record;else state.ky.records.push(record);
    sortKY();

    const site=currentSite();
    if(site?.webhook){
      try{
        const workerNames=(record.workers||[]).map(w=>w.name).filter(Boolean).join('、');
        const res=await fetch(site.webhook,{method:'POST',body:JSON.stringify(Object.assign({},record,{workerNames,type:'ky'}))});
        const txt=await res.text();console.log('KY GAS:',txt);
      }catch(err){console.error('KY GAS:',err);showToast('クラウド保存に失敗（GAS接続）');}
    }
    showToast('保存しました');
    state.ky.view='list';tabBarWrap.style.display='block';
    renderMainTopbar(currentSite());renderTabBar();renderKYList();
  }

    else{const old=state.shinki.records.find(r=>r.id===existingId)||{};record=Object.assign({},old,fd,{id:existingId,updatedAt:now});}
    lsSet('shinki:'+record.id,JSON.stringify(record));
    const idx=state.shinki.records.findIndex(r=>r.id===record.id);
    if(idx>=0)state.shinki.records[idx]=record;else state.shinki.records.push(record);sortShinki();
    const site=currentSite();
    if(site?.webhook){
      try{
        const res=await fetch(site.webhook,{method:'POST',body:JSON.stringify(Object.assign({},record,{type:'shinki',qualificationsText:(record.qualifications||[]).join('、')}))});
        const txt=await res.text();
        try{const j=JSON.parse(txt);if(!j.success)showToast('GASエラー: '+(j.error||'不明'));}
        catch(e){console.warn('Shinki GAS: JSONパース失敗');}
      }catch(err){console.error('Shinki GAS:',err);showToast('クラウド保存に失敗（GAS接続）');}
    }
    showToast('保存しました');
    state.shinki.view='list';tabBarWrap.style.display='block';renderMainTopbar(currentSite());renderTabBar();renderShinkiList();
  }

  /* ============================================================
     写真報告 MODULE
  ============================================================ */
  function renderPhotoTab(){
    const site=currentSite();
    tbInner.innerHTML=`<div class="stamp-mark" style="font-size:16px;">📸</div><div class="site-name">${site?esc(site.name):'現場未設定'}</div><button class="gear-btn" id="phGear">⚙</button>`;
    tbInner.querySelector('#phGear').onclick=()=>openSettings();
    const today=todayStr();
    const warn=(!site?.webhook?'<div style="font-size:12px;color:var(--red);margin-bottom:8px;">⚠ 設定からWebhook URLを入力してください</div>':'')
              +(!site?.imgbbKey?'<div style="font-size:12px;color:var(--red);margin-bottom:8px;">⚠ 設定からImgBB APIキーを入力してください</div>':'');
    mainArea.innerHTML=`
      <div class="section" style="margin-top:16px;">
        <div class="section-head">写真報告</div>
        <div class="section-body">
          <div class="photo-preview" id="photoPrev"><div class="ph-hint"><span class="ph-icon">📷</span>タップして写真を選択</div></div>
          <input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none;">
          <div class="field"><label>日付</label><input type="date" id="ph_d" value="${today}"></div>
          <div class="row2">
            <div class="field"><label>会社名</label><input type="text" id="ph_co" value="${esc(state.ky.shared.companyName)}" placeholder="会社名"></div>
            <div class="field"><label>氏名</label><input type="text" id="ph_nm" value="${esc(state.ky.personal.displayName)}" placeholder="氏名"></div>
          </div>
          <div class="field"><label>コメント</label><textarea id="ph_cm" rows="3" placeholder="報告内容・状況など"></textarea></div>
          ${warn}
          <button class="btn btn-primary btn-block" id="phSubmit">送信する</button>
        </div>
      </div>`;

    const prev=mainArea.querySelector('#photoPrev');
    const input=mainArea.querySelector('#photoInput');
    let selectedFile=null;
    prev.onclick=()=>input.click();
    input.onchange=()=>{
      const file=input.files[0];if(!file)return;
      selectedFile=file;
      prev.innerHTML=`<img src="${URL.createObjectURL(file)}" alt="preview">`;
    };

    mainArea.querySelector('#phSubmit').onclick=async()=>{
      const g=id=>mainArea.querySelector('#'+id);
      if(!selectedFile){showToast('写真を選択してください');return;}
      if(!site?.imgbbKey){showToast('設定にImgBB APIキーを入力してください');return;}
      if(!site?.webhook){showToast('設定にWebhook URLを入力してください');return;}
      const btn=mainArea.querySelector('#phSubmit');
      btn.disabled=true;btn.textContent='アップロード中…';
      try{
        // 1. 写真をImgBBにアップロード（DriveApp不要）
        const {base64}=await resizePhoto(selectedFile);
        const fd=new FormData();
        fd.append('image',base64);
        const imgRes=await fetch('https://api.imgbb.com/1/upload?key='+site.imgbbKey,{method:'POST',body:fd});
        const imgData=await imgRes.json();
        if(!imgData.success){
          showToast('画像アップロード失敗: '+(imgData.error?.message||'ImgBBエラー'));
          btn.disabled=false;btn.textContent='送信する';return;
        }
        const imageUrl=imgData.data.url;
        const thumbUrl=imgData.data.thumb?.url||imageUrl;

        // 2. メタデータをGASに送信（SpreadsheetAppのみ使用）
        const nm=g('ph_nm').value.trim();
        if(nm&&nm!==state.ky.personal.displayName){state.ky.personal.displayName=nm;lsSet('ky:personal',JSON.stringify(state.ky.personal));}
        const payload={type:'photo',date:g('ph_d').value,company:g('ph_co').value.trim(),name:nm,comment:g('ph_cm').value.trim(),siteName:site.name||'',imageUrl,thumbUrl};
        const res=await fetch(site.webhook,{method:'POST',body:JSON.stringify(payload)});
        const text=await res.text();
        let json;
        try{json=JSON.parse(text);}catch(e){json={success:false,error:'JSONパース失敗'};}
        if(json.success){
          showToast('送信しました');
          prev.innerHTML='<div class="ph-hint"><span class="ph-icon">📷</span>タップして写真を選択</div>';
          g('ph_cm').value='';selectedFile=null;
        }else showToast('GASエラー: '+(json.error||'不明'));
      }catch(err){
        console.error('写真送信エラー:',err);
        showToast('送信に失敗しました: '+err.message);
      }
      btn.disabled=false;btn.textContent='送信する';
    };
  }

  /* ============================================================
     概要 MODULE
  ============================================================ */
  function renderOverview(site){
    tbInner.innerHTML=`<div class="stamp-mark" style="font-size:11px;">概要</div><div class="site-name">${site?esc(site.name):'現場未設定'}</div><button class="gear-btn" id="ovG">⚙</button>`;
    tbInner.querySelector('#ovG').onclick=()=>openSettings();
    const ov=currentOverview();
    if(!ov?.projectName){
      mainArea.innerHTML=`<div class="empty-state" style="margin-top:30px;"><div class="big">📄</div>${site?.webhook?'概要データを取得中か、まだ登録されていません。':'設定からWebhook URLと概要を入力してください。'}<br><br><button class="btn btn-primary" id="ovS">設定を開く</button></div>`;
      mainArea.querySelector('#ovS').onclick=()=>openSettings();return;
    }
    const fmtD=d=>{if(!d)return '';const s=String(d).trim();if(!s.match(/^\d{4}-\d{2}-\d{2}/))return s;const p=s.split('-');return p[0]+'年'+Number(p[1])+'月'+Number(p[2])+'日';};
    const period=[ov.periodStart,ov.periodEnd].filter(Boolean).map(fmtD).join(' 〜 ')||'—';
    const row=(l,v)=>v?`<div class="ov-row"><div class="ov-label">${esc(l)}</div><div class="ov-value">${v}</div></div>`:'';
    mainArea.innerHTML=`
      <div class="section" style="margin-top:16px;"><div class="section-head">工事概要</div><div class="section-body">
        ${row('工事名',esc(ov.projectName))}${row('発注者',esc(ov.client))}${row('設計監理',esc(ov.designer))}${row('請負者',esc(ov.contractor))}${row('工期',esc(period))}${row('場所',esc(ov.location))}${row('構造・規模',esc(ov.structure))}${ov.area?row('延べ面積',esc(ov.area)):''}
      </div></div>
      ${ov.cycleText?`<div class="section"><div class="section-head">施工サイクル</div><div class="section-body"><div class="ov-pre">${esc(ov.cycleText)}</div></div></div>`:''}
      ${ov.safetyText?`<div class="section"><div class="section-head">作業所安全遵守事項</div><div class="section-body"><div class="ov-pre">${esc(ov.safetyText)}</div></div></div>`:''}
      ${(ov.contactName||ov.contactPhone)?`<div class="section"><div class="section-head">担当者連絡先</div><div class="section-body">${row('氏名',esc(ov.contactName))}${ov.contactPhone?row('TEL',`<a href="tel:${esc(ov.contactPhone)}">${esc(ov.contactPhone)}</a>`):''}</div></div>`:''}`;
  }

  init();
})();
</script>
